<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防汛簽證練習系統</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #f39c12; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 600px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 10px; border: 1px solid var(--primary); background: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .mode-btn.active { background: var(--primary); color: white; }
        .question-box { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid var(--primary); }
        .option-item { display: block; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; position: relative; }
        .option-item input { margin-right: 10px; }
        .option-item.correct { border: 2px solid var(--secondary); background: #e8f5e9; }
        .option-item.wrong { border: 2px solid var(--danger); background: #ffebee; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .main-btn { padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .sub-btn { padding: 10px; background: #95a5a6; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .analysis { margin-top: 15px; padding: 15px; background: #fff3cd; border-left: 5px solid var(--accent); border-radius: 8px; display: none; line-height: 1.6; }
        .footer-info { margin-top: 30px; padding-top: 15px; border-top: 1px dashed #ccc; color: #7f8c8d; font-size: 13px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2>防汛簽證練習系統</h2>
        <div id="progress">進度：載入中...</div>
    </div>

    <div class="mode-selector">
        <button class="mode-btn active" id="btn-basic" onclick="switchMode('basic')">第一關：基礎複選</button>
        <button class="mode-btn" id="btn-scenario" onclick="switchMode('scenario')">第二關：情境模擬</button>
    </div>

    <div id="quiz-area">
        <div class="question-box" id="q-text"></div>
        <div id="options-area"></div>
        
        <div class="analysis" id="analysis-box">
            <strong>💡 白話解析：</strong><br>
            <span id="analysis-text"></span>
        </div>

        <div class="btn-group" style="margin-top:20px;">
            <button class="main-btn" id="submit-btn" onclick="checkAnswer()">送出判斷</button>
            <button class="main-btn" id="next-btn" onclick="nextQuestion()" style="display:none;">下一題</button>
            <button class="sub-btn" onclick="shuffleCurrentMode()">亂序出題 (挑戰用)</button>
            <button class="sub-btn" onclick="resetProgress()" style="background:#7f8c8d">重置本關進度</button>
        </div>
    </div>

    <div class="footer-info">
        <strong>【開發與版本資訊】</strong><br>
        <span id="dev-info">本系統由 散木團隊 製作</span>
    </div>
</div>

<script>
// 題庫數據區
const basicQuestions = [
    { q: "關於洪水的特性，下列哪些敘述正確？(複選)", options: ["具有突發性", "力量非常大", "完全可以精準預測", "環境多變難以掌握"], ans: [0, 1, 3], analysis: "洪水力量大且難預測。救援前第一步是判斷環境，不是盲目衝進去！" },
    { q: "台灣洪水具有哪些特徵？(複選)", options: ["降雨非常集中", "地形陡峭", "河川長度極長", "多屬於急流型洪水"], ans: [0, 1, 3], analysis: "台灣河川短促、坡度大，流速很快，足以沖倒成年人。" },
    { q: "關於「速度平方效應」，下列哪些說法是正確的？(複選)", options: ["流速增加 1 倍，力量增加 2 倍", "流速增加 1 倍，力量增加 4 倍", "流速增加 3 倍，力量增加 9 倍", "水流推力與流速的平方成正比"], ans: [1, 2, 3], analysis: "流速只要快一點點，力量是成平方倍跳上去的，這是科學！" },
    { q: "當流速達到多少時，一般成人通常就站不住了？(複選)", options: ["流速 0.5 m/s", "流速 1.5 m/s 開始不穩", "流速 2 m/s 幾乎站不住", "流速 3 m/s 成人會被沖倒"], ans: [1, 2, 3], analysis: "1.5公尺/秒就開始晃了，3公尺/秒以上絕對會被沖走。" },
    { q: "急流環境中常見的「過濾機 (Strainer)」障礙物包含哪些？(複選)", options: ["水中的倒木", "橋墩結構", "鐵欄杆", "河岸邊的緩流區"], ans: [0, 1, 2], analysis: "Strainer 是會讓水流過、但把人卡住的東西，非常致命！" },
    { q: "關於「回流區 (Hydraulic)」，下列敘述哪些正確？(複選)", options: ["又稱為液壓區", "水流越過落差後形成", "人掉進去會被不斷拉回", "是絕對安全的休息區"], ans: [0, 1, 2], analysis: "回流區會把人捲住，讓人無法自行脫困，要非常小心。" },
    { q: "洪水救援的優先順序（低風險到高風險）為何？(複選)", options: ["優先使用非接觸式救援（如拋繩）", "儘量避免涉水救援", "船艇救援風險低於拋繩", "下水游泳接近是最後手段"], ans: [0, 1, 3], analysis: "能不接觸就不接觸，拋繩比下水安全多了！" },
    { q: "急流游泳技術中，「防禦式游泳」的重點為何？(複選)", options: ["背部朝下", "腳朝下游方向", "雙腳抬起防止卡住", "頭部朝下游觀察"], ans: [0, 1, 2], analysis: "腳朝下游是用來推開障礙物、保護頭部的。" },
    { q: "執行「三人涉水」隊形時，下列敘述哪些正確？(複選)", options: ["最強壯的人在上游位", "三人站成三角形", "互相抓住救生衣肩帶", "最強壯的人在最下游"], ans: [0, 1, 2], analysis: "上游的人負責破水，三角形結構最穩。" },

    { q: "合格的急流救生衣 (PFD) 具備哪些功能？(複選)", options: ["浮力約 70–100 N", "具備快速釋放扣", "具備救援拖曳環", "必須是自動充氣式"], ans: [0, 1, 2], analysis: "急流救生衣不能用充氣式的，會破！快速釋放扣是保命用的。" },
    { q: "洪水固定點選擇 tree (樹木) 時，應注意哪些？(複選)", options: ["樹幹直徑建議 30 cm 以上", "根系要穩定", "土壤不能過於鬆軟", "只要有葉子就可以"], ans: [0, 1, 2], analysis: "大樹才拉得住橫渡的張力，小樹會被拔起來。" },

// App 核心邏輯 (其餘邏輯同上個版本)
let currentMode = 'basic';
let currentIndex = 0;
let questions = [];

function initApp() {
    currentMode = localStorage.getItem('flood_mode') || 'basic';
    const savedIndex = localStorage.getItem(`flood_index_${currentMode}`);
    currentIndex = savedIndex ? parseInt(savedIndex) : 0;
    
    updateModeButtons();
    loadQuestions();
    showQuestion();
    
    // 預留版本資訊更新
    document.getElementById('dev-info').innerText = "版本：v1.0.0 | 最後更新：2026/03/23";
}

function switchMode(mode) {
    currentMode = mode;
    localStorage.setItem('flood_mode', mode);
    const savedIndex = localStorage.getItem(`flood_index_${currentMode}`);
    currentIndex = savedIndex ? parseInt(savedIndex) : 0;
    
    updateModeButtons();
    loadQuestions();
    showQuestion();
}

function updateModeButtons() {
    document.getElementById('btn-basic').className = `mode-btn ${currentMode === 'basic' ? 'active' : ''}`;
    document.getElementById('btn-scenario').className = `mode-btn ${currentMode === 'scenario' ? 'active' : ''}`;
}

function loadQuestions() {
    questions = currentMode === 'basic' ? [...basicQuestions] : [...scenarioQuestions];
}

function showQuestion() {
    if (currentIndex >= questions.length) {
        document.getElementById('quiz-area').innerHTML = "<h3>✅ 恭喜完成本區所有練習！</h3><button class='main-btn' onclick='resetProgress()'>回第一題重新挑戰</button>";
        return;
    }
    
    const data = questions[currentIndex];
    document.getElementById('progress').innerText = `進度：第 ${currentIndex + 1} / ${questions.length} 題`;
    document.getElementById('q-text').innerText = data.q;
    document.getElementById('analysis-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'block';
    document.getElementById('next-btn').style.display = 'none';
    
    const optionsArea = document.getElementById('options-area');
    optionsArea.innerHTML = '';
    data.options.forEach((opt, i) => {
        optionsArea.innerHTML += `<label class="option-item" id="opt-${i}"><input type="checkbox" value="${i}"> ${opt}</label>`;
    });
}

function checkAnswer() {
    const data = questions[currentIndex];
    const inputs = document.querySelectorAll('input');
    const selected = Array.from(document.querySelectorAll('input:checked')).map(el => parseInt(el.value));
    
    let isPerfect = true;
    
    data.options.forEach((_, i) => {
        const item = document.getElementById(`opt-${i}`);
        const isCorrect = data.ans.includes(i);
        const isSelected = selected.includes(i);
        
        if (isCorrect) {
            item.classList.add('correct');
        }
        if (isSelected && !isCorrect) {
            item.classList.add('wrong');
            isPerfect = false;
        }
        if (isCorrect && !isSelected) {
            isPerfect = false;
        }
    });

    document.getElementById('analysis-text').innerText = data.analysis;
    document.getElementById('analysis-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
    currentIndex++;
    localStorage.setItem(`flood_index_${currentMode}`, currentIndex);
    showQuestion();
}

function shuffleCurrentMode() {
    for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    currentIndex = 0;
    showQuestion();
}

function resetProgress() {
    if(confirm("確定要清除本關進度，從第一題重新開始嗎？")) {
        localStorage.removeItem(`flood_index_${currentMode}`);
        currentIndex = 0;
        showQuestion();
    }
}

initApp();
</script>
